<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TD Interview — Teleprompter</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #181c24;
  --border: rgba(255,255,255,0.08);
  --accent: #4ade9a;
  --accent-dim: rgba(74,222,154,0.15);
  --blue: #60a5fa;
  --yellow: #fbbf24;
  --pink: #f472b6;
  --red: #f87171;
  --text: #f0f2f8;
  --text-muted: #6b7280;
  --text-dim: #374151;
  --highlight: rgba(74,222,154,0.12);
  --scroll-line: rgba(74,222,154,0.4);
}

body {
  font-family: 'Atkinson Hyperlegible', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOP CONTROL BAR ── */
.topbar {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  z-index: 100;
}

.topbar-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
  margin-right: 6px;
}

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
}

.ctrl-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.ctrl-btn {
  background: none;
  border: none;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
  transition: background 0.1s;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.08); }

.ctrl-val {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  min-width: 28px;
  text-align: center;
}

.play-btn {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 6px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.play-btn:hover { opacity: 0.85; }
.play-btn.playing { background: var(--yellow); }

.reset-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.reset-btn:hover { border-color: var(--text-muted); color: var(--text); }

.spacer { flex: 1; }

.q-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}

.q-nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.1s;
}
.q-nav-btn:hover { background: rgba(255,255,255,0.06); }

.q-counter {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  min-width: 60px;
  text-align: center;
}

/* ── SIDEBAR Q LIST ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.sidebar-section {
  border-bottom: 1px solid var(--border);
}

.sidebar-heading {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 12px 14px 6px;
}

.sidebar-item {
  display: block;
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  line-height: 1.4;
  border-left: 2px solid transparent;
  transition: all 0.1s;
  font-family: 'Atkinson Hyperlegible', sans-serif;
}

.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-left-color: var(--accent);
}

/* ── TELEPROMPTER MAIN ── */
.prompter-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Gradient fade top & bottom */
.prompter-wrap::before,
.prompter-wrap::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 100px;
  z-index: 10;
  pointer-events: none;
}
.prompter-wrap::before {
  top: 0;
  background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
}
.prompter-wrap::after {
  bottom: 0;
  background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
}

/* Reading guide line */
.guide-line {
  position: absolute;
  top: 38%;
  left: 0; right: 0;
  height: 2px;
  background: var(--scroll-line);
  z-index: 11;
  pointer-events: none;
  box-shadow: 0 0 12px var(--accent);
}

.prompter-scroll {
  height: 100%;
  overflow-y: auto;
  scrollbar-width: none;
  padding: 45vh 60px 55vh;
}
.prompter-scroll::-webkit-scrollbar { display: none; }

/* ── CARD STYLES ── */
.card {
  max-width: 780px;
  margin: 0 auto 60px;
  opacity: 0.3;
  transition: opacity 0.4s;
}
.card.current { opacity: 1; }
.card.nearby { opacity: 0.65; }

.card-section-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-section-badge::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.card-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.card-question {
  font-size: clamp(18px, 2.5vw, 26px);
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 20px;
  padding: 16px 20px;
  background: var(--surface2);
  border-left: 3px solid;
  border-radius: 0 8px 8px 0;
}

.card-answer-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
}

.card-answer {
  font-size: clamp(20px, 2.8vw, 30px);
  line-height: 1.85;
  color: var(--text);
  font-weight: 400;
}

/* Pause markers — visual breath points */
.card-answer .pause {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  margin: 0 6px;
  vertical-align: middle;
  opacity: 0.6;
}

.card-tip {
  margin-top: 20px;
  padding: 12px 16px;
  background: rgba(74,222,154,0.06);
  border: 1px solid rgba(74,222,154,0.15);
  border-radius: 8px;
  font-size: clamp(13px, 1.6vw, 16px);
  color: var(--text-muted);
  line-height: 1.6;
}

.card-tip strong { color: var(--accent); }

.card-warn {
  margin-top: 20px;
  padding: 12px 16px;
  background: rgba(251,191,36,0.06);
  border: 1px solid rgba(251,191,36,0.2);
  border-radius: 8px;
  font-size: clamp(13px, 1.6vw, 16px);
  color: var(--text-muted);
  line-height: 1.6;
}
.card-warn strong { color: var(--yellow); }

/* STAR labels */
.star-label {
  font-weight: 700;
  font-size: 0.9em;
}

/* Font size toggle classes */
body.font-sm .card-answer { font-size: clamp(16px, 2vw, 22px); }
body.font-sm .card-question { font-size: clamp(15px, 2vw, 20px); }
body.font-md .card-answer { font-size: clamp(20px, 2.8vw, 30px); }
body.font-md .card-question { font-size: clamp(18px, 2.5vw, 26px); }
body.font-lg .card-answer { font-size: clamp(26px, 3.5vw, 38px); line-height: 1.9; }
body.font-lg .card-question { font-size: clamp(22px, 3vw, 32px); }
body.font-xl .card-answer { font-size: clamp(32px, 4.5vw, 48px); line-height: 1.95; }
body.font-xl .card-question { font-size: clamp(26px, 3.5vw, 40px); }

/* Keyboard hint */
.key-hint {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  white-space: nowrap;
}

/* Progress bar */
.progress-bar {
  height: 2px;
  background: var(--border);
  flex-shrink: 0;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.3s;
}
</style>
</head>
<body class="font-md">

  <!-- Speed -->
  <div class="ctrl-group">
    <span class="ctrl-label">Speed</span>

    <button class="ctrl-btn" onclick="changeSpeed(0.5)">+</button>
  </div>

  <!-- Font size -->
  <div class="ctrl-group">
    <span class="ctrl-label">Text</span>
    <button class="ctrl-btn" onclick="changeFont(-1)">A−</button>
    <span class="ctrl-val" id="fontVal">M</span>
    <button class="ctrl-btn" onclick="changeFont(1)">A+</button>
  </div>

  <span class="spacer"></span>

  <!-- Q navigation -->
  <div class="q-nav">
    <button class="q-nav-btn" onclick="prevCard()">‹</button>
    <span class="q-counter" id="qCounter">1 / 44</span>
    <button class="q-nav-btn" onclick="nextCard()">›</button>
  </div>

  <span class="key-hint">Space = play/pause · ← → = prev/next</span>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="layout">
  <!-- Sidebar -->

  <!-- Prompter -->

</div>

        answer: `I'd need to give my current employer proper notice — <span class="pause"></span> typically two weeks, <span class="pause"></span> though I'd want to make sure I transition my projects responsibly <span class="pause"></span> so I'm not leaving them in a difficult spot. <span class="pause"></span>

So realistically, three to four weeks from an offer date would be my target. <span class="pause"></span>

If there's a specific timeline that works better for TD, <span class="pause"></span> I'm open to discussing it.`
      },
      {
        num: '44',
        question: '"Is there anything else you\'d like us to know?"',
        answer: `I'd just reiterate that I think there's a strong match here — <span class="pause"></span> my Azure, Terraform, Kubernetes, and scripting background <span class="pause"></span> align well with what you're looking for, <span class="pause"></span> and the financial services context is something I've been operating in for several years. <span class="pause"></span>

I'm genuinely excited about this domain. <span class="pause"></span>

And yes, I do have a few questions for you — <span class="pause"></span>

What does the team's current infrastructure stack look like, <span class="pause"></span> and where are the biggest engineering challenges right now? <span class="pause"></span>

What would success look like in the first 90 days? <span class="pause"></span>

And what are the next steps in the process after this call?`,
        tip: '💡 Always close positively and specifically. "I\'m excited about this" lands much better than "sounds good." Always ask at least one question.'
      }
    ]
  }
];

// ── FLATTEN ALL CARDS ──
let allCards = [];
sections.forEach(s => {
  s.cards.forEach(c => allCards.push({ ...c, sectionLabel: s.label, sectionColor: s.color }));
});

let currentIdx = 0;
let isPlaying = false;
let scrollInterval = null;
let speed = 1.0;
let fontIdx = 1; // 0=sm,1=md,2=lg,3=xl
const fontClasses = ['font-sm','font-md','font-lg','font-xl'];
const fontLabels = ['S','M','L','XL'];

// ── BUILD SIDEBAR ──
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  let absIdx = 0;
  sections.forEach(s => {
    html += `<div class="sidebar-section">
      <div class="sidebar-heading" style="color:${s.color}">${s.label}</div>`;
    s.cards.forEach(c => {
      const i = absIdx;
      const short = c.question.replace(/"/g,'').substring(0,50) + (c.question.length > 52 ? '…' : '');
      html += `<button class="sidebar-item ${i===0?'active':''}" id="sb-${i}" onclick="jumpTo(${i})">${c.num}. ${short}</button>`;
      absIdx++;
    });
    html += '</div>';
  });
  sb.innerHTML = html;
}

// ── BUILD PROMPTER ──
function buildPrompter() {
  const scroller = document.getElementById('scroller');
  let html = '';
  allCards.forEach((c, i) => {
    const tipHtml = c.tip ? `<div class="card-tip"><strong>Note:</strong> ${c.tip}</div>` : '';
    const warnHtml = c.warn ? `<div class="card-warn"><strong>Heads up:</strong> ${c.warn}</div>` : '';
    html += `
      <div class="card ${i===0?'current':''}" id="card-${i}" data-idx="${i}">
        <div class="card-section-badge" style="color:${c.sectionColor}">${c.sectionLabel} · Q${c.num}</div>
        <div class="card-question" style="border-left-color:${c.sectionColor}">${c.question}</div>
        <div class="card-answer-label">Your answer</div>
        <div class="card-answer">${c.answer}</div>
        ${tipHtml}${warnHtml}
      </div>`;
  });
  scroller.innerHTML = html;

  // Observe which card is in view
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && e.intersectionRatio > 0.3) {
        const idx = parseInt(e.target.dataset.idx);
        updateActive(idx);
      }
    });
  }, { threshold: 0.3, rootMargin: '-30% 0px -30% 0px' });

  document.querySelectorAll('.card').forEach(el => observer.observe(el));
}

function updateActive(idx) {
  if (idx === currentIdx) return;
  currentIdx = idx;

  document.querySelectorAll('.card').forEach((el, i) => {
    el.classList.remove('current','nearby');
    const diff = Math.abs(i - idx);
    if (diff === 0) el.classList.add('current');
    else if (diff <= 2) el.classList.add('nearby');
  });

  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const sbItem = document.getElementById(`sb-${idx}`);
  if (sbItem) sbItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  document.getElementById('qCounter').textContent = `${idx + 1} / ${allCards.length}`;
  document.getElementById('progressFill').style.width = `${((idx+1)/allCards.length)*100}%`;
}

// ── AUTO SCROLL ──
function togglePlay() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('playBtn');
  if (isPlaying) {
    btn.textContent = '⏸ Pause';
    btn.classList.add('playing');
    startScroll();
  } else {
    btn.textContent = '▶ Play';
    btn.classList.remove('playing');
    stopScroll();
  }
}

function startScroll() {
  stopScroll();
  const scroller = document.getElementById('scroller');
  scrollInterval = setInterval(() => {
    scroller.scrollBy({ top: speed * 0.7, behavior: 'auto' });
    if (scroller.scrollTop + scroller.clientHeight >= scroller.scrollHeight - 10) {
      stopScroll();
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶ Play';
      document.getElementById('playBtn').classList.remove('playing');
    }
  }, 16);
}

function stopScroll() {
  if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
}

function resetScroll() {
  stopScroll();
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('scroller').scrollTo({ top: 0, behavior: 'smooth' });
}

function changeSpeed(delta) {
  speed = Math.max(0.5, Math.min(5, parseFloat((speed + delta).toFixed(1))));
  document.getElementById('speedVal').textContent = speed.toFixed(1) + '×';
  if (isPlaying) { stopScroll(); startScroll(); }
}

// ── FONT SIZE ──
function changeFont(delta) {
  document.body.classList.remove(fontClasses[fontIdx]);
  fontIdx = Math.max(0, Math.min(3, fontIdx + delta));
  document.body.classList.add(fontClasses[fontIdx]);
  document.getElementById('fontVal').textContent = fontLabels[fontIdx];
}

// ── NAVIGATION ──
function jumpTo(idx) {
  const card = document.getElementById(`card-${idx}`);
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  updateActive(idx);
}

function prevCard() { if (currentIdx > 0) jumpTo(currentIdx - 1); }
function nextCard() { if (currentIdx < allCards.length - 1) jumpTo(currentIdx + 1); }

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight' || e.code === 'ArrowDown') { e.preventDefault(); nextCard(); }
  if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') { e.preventDefault(); prevCard(); }
  if (e.code === 'Equal' || e.code === 'NumpadAdd') changeSpeed(0.5);
  if (e.code === 'Minus' || e.code === 'NumpadSubtract') changeSpeed(-0.5);
});

// ── INIT ──
buildSidebar();
buildPrompter();
document.body.classList.add('font-md');
</script>
</body>
</html>
